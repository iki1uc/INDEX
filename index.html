<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MEGA-INDEX :: RESPO 100</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      padding: 20px;
      white-space: pre;
    }
    #index {
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <pre id="index">Lade MEGA-INDEX…</pre>

  <script type="module">

    // -----------------------------------------
    // 1) RESPO-Daten (intern, keine externen Dateien)
    // -----------------------------------------
    const RAW = {
      A1: { status: "green", tmp: 12, online: true,  wartung: false },
      B2: { status: "yellow", tmp: 7, online: false, wartung: true  },
      C3: { status: "red", tmp: 0, online: false, wartung: false },
      D4: { status: "blue", tmp: 3, online: true,  wartung: false }
    };

    const RESPO_MAP = {
      A1: "modul/A1",
      B2: "modul/B2",
      C3: "modul/C3",
      D4: "modul/D4"
    };

    // -----------------------------------------
    // 2) Icons
    // -----------------------------------------
    function colorIcon(status){
      if(status === "green")  return "🟩";
      if(status === "yellow") return "🟨";
      if(status === "red")    return "🟥";
      if(status === "blue")   return "🟦";
      return "⬜";
    }

    function onlineIcon(flag){
      return flag ? "🟢 online" : "🔴 offline";
    }

    function wartungIcon(flag){
      return flag ? "⚠️ Wartung" : "✔️ ok";
    }

    // -----------------------------------------
    // 3) Render-Funktion
    // -----------------------------------------
    function render(){
      let out = "RESPO 100 :: MEGA-INDEX\n--------------------------------\n";

      Object.keys(RAW).forEach((key, i) => {
        const r = RAW[key];
        const color = colorIcon(r.status);
        const tmp = r.tmp;
        const path = RESPO_MAP[key] || "kein-pfad";

        out += `${String(i+1).padEnd(4)} → ((${key})) ${color} tmp:${tmp}\n`;
        out += `     STATUS → ${onlineIcon(r.online)} | ${wartungIcon(r.wartung)}\n`;

        if(r.status === "green"){
          out += `     NAVI   → ${path}\n`;
        }

        out += "\n";
      });

      out += "--------------------------------\nNC.link aktiv\nÜbergang aktiv\n";

      document.getElementById("index").textContent = out;
    }

    // -----------------------------------------
    // 4) Render starten
    // -----------------------------------------
    render();

  </script>
</body>
</html>
