<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>INDEX :: ROOT</title>
  <style>
    body { background:#111; color:#eee; font-family:monospace; padding:20px; }
    pre { white-space:pre; }
  </style>
</head>

<body>
<pre id="root">Lade A und B…</pre>

<script>
async function load(url){
  try{
    const res = await fetch(url);
    if(!res.ok) return `FEHLER: ${url} nicht erreichbar`;
    return await res.text();
  }catch(e){
    return `FEHLER: ${url} offline`;
  }
}

async function render(){
  const A = await load("indexA.html");
  const B = await load("indexB.html");

  const out =
`INDEX :: ROOT
--------------------------------
A-INDEX geladen:
${A}

--------------------------------
B-INDEX geladen:
${B}

--------------------------------
Vergleich aktiv
`;

  document.getElementById("root").textContent = out;
}

render();
</script>
</body>
</html>
