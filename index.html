<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INDEX · ALL · VECTOR · γ∞</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
.karo { position:absolute; width:28px; height:28px; border:1px solid #333; font-size:8px; transform:scale(4); transform-origin:top left; }
.cell { position:absolute; background:#111; padding:5px; border:1px solid #333; }
.small { width:25px; height:25px; text-align:center; }
#vector27 { position:relative; height:1200px; }
#vector81 { position:relative; width:300px; height:300px; margin-top:40px; }
#index_karo { position:relative; width:600px; height:600px; }
#all_monitor { white-space:pre; margin-top:40px; }

.cube {
  width: 120px;
  height: 120px;
  position: relative;
  margin: 40px;
  transform-style: preserve-3d;
  animation: spin 3s infinite linear;
}
.face {
  position: absolute;
  width: 120px;
  height: 120px;
  background: #0f0;
  border: 2px solid #333;
  font-size: 20px;
  text-align: center;
  padding-top: 40px;
}
.front  { transform: translateZ(60px); }
.back   { transform: rotateY(180deg) translateZ(60px); }
.left   { transform: rotateY(-90deg) translateZ(60px); }
.right  { transform: rotateY(90deg) translateZ(60px); }
.top    { transform: rotateX(90deg) translateZ(60px); }
.bottom { transform: rotateX(-90deg) translateZ(60px); }

@keyframes spin {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(360deg); }
}
</style>

</head>
